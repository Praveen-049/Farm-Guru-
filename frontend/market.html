<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farm Guru - Market Prices</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard-container">
    <aside class="sidebar">
        <h2>Farm Guru</h2>
        <nav id="nav-links">
            <!-- Dynamic Navigation -->
        </nav>
        <div style="margin-top: auto;">
            <button onclick="logout()" class="btn-secondary">Sign Out</button>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <div>
                <h1>Real-time Market Prices</h1>
                <p style="color: var(--text-muted);">Compare prices across different markets and plan your sales.</p>
            </div>
            <button onclick="loadPrices()" style="width: auto; padding: 10px 25px;">Refresh Data</button>
        </header>

        <div class="card" style="padding: 0; overflow: hidden;">
            <div class="table-container">
                <table id="table">
                    <thead>
                        <tr>
                            <th>Crop Type</th>
                            <th>Market Destination</th>
                            <th>Current Price</th>
                            <th>Distance</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Data will be loaded here -->
                    </tbody>
                </table>
            </div>
            <div id="loading" style="text-align: center; padding: 60px; color: var(--text-muted);">
                <p>Click "Refresh Data" to fetch latest intelligence.</p>
            </div>
        </div>
    </main>
</div>

<script>
    async function loadPrices(){
        const loading = document.getElementById("loading");
        const tbody = document.getElementById("table-body");
        
        loading.innerText = "Fetching latest market data...";
        
        try {
            const res = await fetch("http://127.0.0.1:8000/prices");
            const data = await res.json();

            tbody.innerHTML = "";
            loading.style.display = "none";

            data.forEach(row => {
                const isBest = row.recommended;
                tbody.innerHTML += `
                    <tr class="${isBest ? 'fade-in' : ''}">
                        <td><strong style="color: var(--primary);">${row.crop}</strong></td>
                        <td>${row.market}</td>
                        <td style="font-weight: 700;">₹${row.price}/kg</td>
                        <td>${row.distance}</td>
                        <td>
                            ${isBest ? '<span class="badge badge-primary">Recommended</span>' : '<span class="badge" style="background: #f1f5f9; color: var(--text-muted);">Standard</span>'}
                        </td>
                    </tr>`;
            });
        } catch (e) {
            loading.innerText = "Error loading data. Is the backend running?";
        }
    }

    const role = localStorage.getItem("role") || "farmer";

    // Dynamic Sidebar
    const nav = document.getElementById("nav-links");
    if (role === "farmer") {
        nav.innerHTML = `
            <a href="dashboard.html">Dashboard</a>
            <a href="marketplace.html">Sell Crops</a>
            <a href="market.html" class="active">Market Prices</a>
            <a href="demand.html">Demand Prediction</a>
            <a href="consumer_marketplace.html">Buy Crops</a>
        `;
    } else {
        nav.innerHTML = `
            <a href="consumer_marketplace.html">Marketplace</a>
            <a href="consumer_map.html">Map Search</a>
            <a href="market.html" class="active">Market Prices</a>
        `;
    }

    function logout(){
        localStorage.clear();
        window.location = "index.html";
    }

    loadPrices();
</script>

</body>
</html>

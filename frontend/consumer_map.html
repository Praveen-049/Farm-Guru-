<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farm Guru - Map Search</title>
    <link rel="stylesheet" href="style.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
</head>
<body>

<div class="dashboard-container">
    <aside class="sidebar">
        <h2>Farm Guru</h2>
        <nav id="nav-links">
            <!-- Role-based links -->
        </nav>
        <div style="margin-top: auto;">
            <button onclick="logout()" class="btn-secondary">Sign Out</button>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <div>
                <h1>Map Discovery</h1>
                <p style="color: var(--text-muted);">Visualize farmers in your region and explore their offerings.</p>
            </div>
            <div style="display: flex; gap: 15px;">
                <a href="consumer_marketplace.html" class="btn-secondary" style="text-decoration: none; padding: 12px 20px; font-size: 14px;">
                    📋 List View
                </a>
            </div>
        </header>

        <div class="card" style="padding: 10px;">
            <div id="map"></div>
        </div>

        <div id="listings-under-map" class="grid" style="margin-top: 32px;">
            <!-- Could show summary or nearest farmers here -->
        </div>
    </main>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<script>
    const userEmail = localStorage.getItem("email") || "guest@example.com";
    const userRole = localStorage.getItem("role") || "consumer";
    let map;
    let markers = [];

    // Sidebar navigation
    const nav = document.getElementById("nav-links");
    if (userRole === "farmer") {
        nav.innerHTML = `<a href="dashboard.html">Dashboard</a><a href="marketplace.html">Sell Crops</a><a href="market.html">Market Prices</a><a href="demand.html">Demand Prediction</a><a href="consumer_marketplace.html">Buy Crops</a>`;
    } else {
        nav.innerHTML = `<a href="consumer_marketplace.html">Marketplace</a><a href="consumer_map.html" class="active">Map Search</a><a href="market.html">Market Prices</a>`;
    }

    function initMap() {
        console.log("Initializing map...");
        // Default to India center
        map = L.map('map').setView([20.5937, 78.9629], 5);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // Try Geolocation
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                const userLoc = [pos.coords.latitude, pos.coords.longitude];
                map.setView(userLoc, 10);
                L.circle(userLoc, {
                    color: '#2d6a4f',
                    fillColor: '#2d6a4f',
                    fillOpacity: 0.1,
                    radius: 5000
                }).addTo(map).bindPopup("You are here");
            });
        }

        fetchAndMarkListings();
    }

    async function fetchAndMarkListings() {
        try {
            const res = await fetch("http://127.0.0.1:8000/marketplace");
            const data = await res.json();

            data.forEach(item => {
                if (item.latitude && item.longitude && item.farmer !== userEmail) {
                    const marker = L.marker([item.latitude, item.longitude]).addTo(map);
                    marker.bindPopup(`
                        <div style="font-family: 'Outfit', sans-serif;">
                            <h4 style="margin: 0 0 5px 0; color: var(--primary);">${item.crop}</h4>
                            <p style="margin: 0 0 10px 0; font-size: 13px; color: #666;">
                                <strong>₹${item.price}/kg</strong><br>
                                Qty: ${item.quantity}kg<br>
                                Farmer: ${item.farmer}
                            </p>
                            <button onclick="window.location='consumer_marketplace.html?search=${item.crop}'" style="padding: 5px 10px; font-size: 11px; width: 100%; cursor: pointer;">View Details</button>
                        </div>
                    `);
                    markers.push(marker);
                }
            });
        } catch (error) {
            console.error("Map fetch failed", error);
        }
    }

    function logout() {
        localStorage.clear();
        window.location = "index.html";
    }

    window.onload = initMap;
</script>

</body>
</html>

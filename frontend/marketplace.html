<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farm Guru - Sell Crops</title>
    <link rel="stylesheet" href="style.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        #picker-map { 
            height: 250px; 
            width: 100%; 
            border-radius: 12px; 
            margin-top: 10px;
            border: 1px solid #e2e8f0;
            z-index: 1;
        }
        .price-suggestion {
            font-size: 13px;
            background: var(--bg-light);
            padding: 10px;
            border-radius: 8px;
            margin-top: 5px;
            border: 1px solid var(--primary-soft);
            display: none;
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <aside class="sidebar">
        <h2>Farm Guru</h2>
        <nav id="nav-links">
            <!-- Dynamic Navigation -->
        </nav>
        <div style="margin-top: auto;">
            <button onclick="logout()" class="btn-secondary">Sign Out</button>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <div>
                <h1>Sell Your Crops</h1>
                <p style="color: var(--text-muted);">Manage your listings and view interested buyers.</p>
            </div>
        </header>

        <div style="display: grid; grid-template-columns: 380px 1fr; gap: 40px; align-items: start;">
            <div class="card">
                <h3>Post a New Listing</h3>
                <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 24px;">List your crops for consumers to find.</p>
                
                <div class="input-group">
                    <label>Crop Name</label>
                    <input id="crop" placeholder="e.g. Basmati Rice" oninput="updatePriceSuggestion()">
                    <div id="price-hint" class="price-suggestion"></div>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="input-group">
                        <label>Quantity (kg)</label>
                        <input id="quantity" type="number" placeholder="500">
                    </div>
                    <div class="input-group">
                        <label>Price / kg (₹)</label>
                        <input id="price" type="number" placeholder="45">
                    </div>
                </div>

                <div class="input-group">
                    <label>Harvest Date (Optional)</label>
                    <input id="harvest_date" type="date">
                </div>

                <div style="background: var(--white); border-radius: 12px; margin-bottom: 24px;">
                    <label style="margin-bottom: 12px; display: block;">Tap Map to Set Your Farm Location</label>
                    <div id="picker-map"></div>
                    <div id="address-text" style="margin-top: 10px; font-size: 13px; color: var(--text-muted); background: var(--primary-soft); padding: 8px 12px; border-radius: 8px; display: none;">
                        <span style="font-weight: 600;">Location:</span> <span id="display-address">Searching for address...</span>
                    </div>
                    <div style="display: none;">
                        <input id="latitude" type="number" step="any">
                        <input id="longitude" type="number" step="any">
                    </div>
                    <button class="btn-secondary" style="margin-top: 12px; padding: 10px; font-size: 14px;" onclick="getCurrentLocation()">📍 Detect My Location</button>
                </div>
                
                <button onclick="sell()">Publish Listing</button>
            </div>

            <div>
                <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                    <h3>My Active Listings</h3>
                </header>
                <div class="card" style="padding: 0; overflow: hidden;">
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Crop</th>
                                    <th>Qty & Price</th>
                                    <th>Location</th>
                                    <th>Interested Buyers</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="my-listings-body">
                                <!-- Listings loaded here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Modal for editing listings -->
<div id="editModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
    <div class="card" style="width: 400px; background:white;">
        <h3>Edit Listing</h3>
        <input type="hidden" id="edit_listing_id">
        <label>Quantity (kg)</label>
        <input id="edit_quantity" type="number">
        <label>Price per kg (₹)</label>
        <input id="edit_price" type="number">
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button onclick="updateListing()">Save Changes</button>
            <button class="btn-secondary" onclick="document.getElementById('editModal').style.display='none'">Cancel</button>
        </div>
    </div>
</div>

<!-- Modal for viewing interested buyers -->
<div id="buyersModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
    <div class="card" style="width: 500px; background:white;">
        <h3>Interested Buyers</h3>
        <p id="buyers-listing-name" style="color: var(--text-muted); font-size: 14px; margin-bottom: 20px;"></p>
        <div id="buyers-list-container" style="max-height: 300px; overflow-y: auto;">
            <!-- Buyers list here -->
        </div>
        <div style="margin-top: 20px;">
            <button class="btn-secondary" onclick="document.getElementById('buyersModal').style.display='none'">Close</button>
        </div>
    </div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<script>
    const userEmail = localStorage.getItem("email") || "n57264433@gmail.com";
    const role = localStorage.getItem("role") || "farmer";

    // Dynamic Sidebar
    const nav = document.getElementById("nav-links");
    if (role === "farmer") {
        nav.innerHTML = `
            <a href="dashboard.html">Dashboard</a>
            <a href="marketplace.html" class="active">Sell Crops</a>
            <a href="market.html">Market Prices</a>
            <a href="demand.html">Demand Prediction</a>
            <a href="consumer_marketplace.html">Buy Crops</a>
        `;
    } else {
        nav.innerHTML = `
            <a href="consumer_marketplace.html">Marketplace</a>
            <a href="consumer_map.html">Map Search</a>
            <a href="market.html">Market Prices</a>
        `;
    }

    let pickerMap;
    let pickerMarker;
    let myRecentListings = []; // Global state to store listings
    async function reverseGeocode(lat, lon) {
        const addrDiv = document.getElementById("address-text");
        const addrSpan = document.getElementById("display-address");
        addrDiv.style.display = "block";
        addrSpan.innerText = "Searching for address...";
        
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
            const data = await res.json();
            if (data && data.display_name) {
                addrSpan.innerText = data.display_name;
            } else {
                addrSpan.innerText = `Lat: ${lat.toFixed(4)}, Lon: ${lon.toFixed(4)}`;
            }
        } catch (e) {
            addrSpan.innerText = `Lat: ${lat.toFixed(4)}, Lon: ${lon.toFixed(4)}`;
        }
    }

    function initPickerMap() {
        // Default to India
        pickerMap = L.map('picker-map').setView([20.5937, 78.9629], 5);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(pickerMap);

        pickerMap.on('click', function(e) {
            const lat = e.latlng.lat;
            const lon = e.latlng.lng;
            document.getElementById("latitude").value = lat;
            document.getElementById("longitude").value = lon;

            if (pickerMarker) pickerMap.removeLayer(pickerMarker);
            pickerMarker = L.marker([lat, lon]).addTo(pickerMap);
            
            reverseGeocode(lat, lon);
        });
    }

    function getCurrentLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                document.getElementById("latitude").value = lat;
                document.getElementById("longitude").value = lon;

                pickerMap.setView([lat, lon], 13);
                if (pickerMarker) pickerMap.removeLayer(pickerMarker);
                pickerMarker = L.marker([lat, lon]).addTo(pickerMap);
                
                reverseGeocode(lat, lon);
            }, (error) => {
                alert("Error getting location: " + error.message);
            });
        }
    }

    async function updatePriceSuggestion() {
        const crop = document.getElementById("crop").value;
        const hint = document.getElementById("price-hint");
        
        if (crop.length < 3) {
            hint.style.display = "none";
            return;
        }

        try {
            const res = await fetch("http://127.0.0.1:8000/prices");
            const prices = await res.json();
            const relevant = prices.filter(p => p.crop.toLowerCase().includes(crop.toLowerCase()));
            
            if (relevant.length > 0) {
                const avg = relevant.reduce((sum, p) => sum + p.price, 0) / relevant.length;
                hint.style.display = "block";
                hint.innerHTML = `💡 Market insight: <strong>${relevant[0].crop}</strong> is trading around <strong>₹${avg.toFixed(2)}/kg</strong> in other markets.`;
            } else {
                hint.style.display = "none";
            }
        } catch (e) {
            console.error(e);
        }
    }

    async function sell() {
        const crop = document.getElementById("crop").value;
        const quantity = document.getElementById("quantity").value;
        const price = document.getElementById("price").value;
        const harvest_date = document.getElementById("harvest_date").value;
        const lat = document.getElementById("latitude").value;
        const lon = document.getElementById("longitude").value;

        if(!crop || !quantity || !price || !lat || !lon) {
            alert("Please fill in all required fields, including location.");
            return;
        }

        await fetch("http://127.0.0.1:8000/sell", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                crop, 
                quantity: parseInt(quantity), 
                price: parseFloat(price), 
                farmer: userEmail, 
                harvest_date,
                latitude: parseFloat(lat),
                longitude: parseFloat(lon)
            })
        });

        alert("Listing posted successfully!");
        loadMyListings();
    }

    async function loadMyListings() {
        try {
            const res = await fetch(`http://127.0.0.1:8000/listings/farmer/${userEmail}`);
            const data = await res.json();
            const body = document.getElementById("my-listings-body");
            body.innerHTML = "";

            if(data.length === 0) {
                body.innerHTML = "<tr><td colspan='5' style='text-align:center; padding: 40px; color: var(--text-muted);'>No active listings found.</td></tr>";
                return;
            }

            myRecentListings = data; // Store to global state
            data.forEach(item => {
                let buyersCount = item.interested_buyers ? item.interested_buyers.length : 0;
                let buyersHtml = buyersCount > 0 
                    ? `<button class="badge badge-primary" style="border:none; cursor:pointer;" onclick='openBuyersModal("${item.id}")'>${buyersCount} View Interested</button>` 
                    : '<span class="badge badge-accent">0 Interested</span>';
                
                body.innerHTML += `
                    <tr>
                        <td>
                            <div style="font-weight: 600;">${item.crop}</div>
                            <div style="font-size: 12px; color: var(--text-muted);">${item.harvest_date ? 'Harvest: ' + item.harvest_date : 'No harvest date'}</div>
                        </td>
                        <td>
                            <div>${item.quantity} kg</div>
                            <div style="font-weight: 700; color: var(--primary);">₹${item.price}/kg</div>
                        </td>
                        <td>
                            <div style="font-size: 13px;">${item.latitude.toFixed(4)}, ${item.longitude.toFixed(4)}</div>
                        </td>
                        <td>${buyersHtml}</td>
                        <td>
                            <div style="display: flex; gap: 8px;">
                                <button style="padding: 6px 12px; font-size: 12px; width: auto;" onclick="openEditModal('${item.id}', ${item.quantity}, ${item.price})">Edit</button>
                                <button style="padding: 6px 12px; font-size: 12px; width: auto; background-color: #e63946;" onclick="deleteListing('${item.id}')">Delete</button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        } catch (error) {
            console.error("Failed to load listings:", error);
        }
    }

    function openEditModal(id, quantity, price) {
        document.getElementById("edit_listing_id").value = id;
        document.getElementById("edit_quantity").value = quantity;
        document.getElementById("edit_price").value = price;
        document.getElementById("editModal").style.display = 'flex';
    }

    async function openBuyersModal(id) {
        const item = myRecentListings.find(l => l.id === id);
        if (!item) return;

        document.getElementById("buyers-listing-name").innerText = "Listing: " + item.crop;
        const container = document.getElementById("buyers-list-container");
        container.innerHTML = "<p style='padding: 20px; text-align: center;'>Loading buyer details...</p>";
        document.getElementById("buyersModal").style.display = 'flex';
        
        const buyers = item.interested_buyers || [];
        if (buyers.length === 0) {
            container.innerHTML = "<p style='padding: 20px; text-align: center;'>No interests registered yet.</p>";
            return;
        }

        container.innerHTML = "";
        for (const email of buyers) {
            try {
                const res = await fetch(`http://127.0.0.1:8000/user/${email}`);
                const user = await res.json();
                
                if (user.status === "error" || !user.name) {
                    container.innerHTML += `
                        <div style="padding: 15px; border-bottom: 1px solid #eee;">
                            <div style="font-weight: 700; color: #e63946;">Profile Error</div>
                            <div style="font-size: 13px; color: var(--text-muted);">${email}</div>
                        </div>`;
                } else {
                    container.innerHTML += `
                        <div style="display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee;">
                            <div>
                                <div style="font-weight: 700; font-size: 15px;">${user.name || 'Anonymous User'}</div>
                                <div style="font-size: 13px; color: var(--text-muted); margin: 2px 0;">${user.mobile || 'No Mobile'} | ${user.consumer_type || 'Consumer'}</div>
                                <div style="font-size: 12px; color: var(--primary);">${user.email || email}</div>
                            </div>
                            <button onclick="acceptBuyerRequest('${id}', '${user.email || email}')" style="width: auto; padding: 8px 15px; font-size: 12px;">Accept Order</button>
                        </div>
                    `;
                }
            } catch (e) {
                console.error(e);
            }
        }
    }

    async function acceptBuyerRequest(listingId, buyerEmail) {
        if (!confirm(`Are you sure you want to sell this listing to ${buyerEmail}?`)) return;
        
        try {
            const res = await fetch(`http://127.0.0.1:8000/accept-request/${listingId}/${buyerEmail}`, {
                method: "POST"
            });
            const data = await res.json();
            
            if (data.status === "success") {
                alert(data.message);
                document.getElementById("buyersModal").style.display = 'none';
                loadMyListings();
            } else {
                alert("Error: " + (data.message || data.detail || "Server error occurred"));
            }
        } catch (e) {
            console.error(e);
            alert("Failed to connect to server. Check your connection.");
        }
    }

    async function updateListing() {
        const id = document.getElementById("edit_listing_id").value;
        const quantity = document.getElementById("edit_quantity").value;
        const price = document.getElementById("edit_price").value;

        await fetch(`http://127.0.0.1:8000/listings/${id}`, {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            // We just send the fields we want to update for this simple demo
            body: JSON.stringify({crop: "temp", farmer: "temp", quantity: quantity, price: price})
        });

        document.getElementById("editModal").style.display = 'none';
        loadMyListings();
    }

    async function deleteListing(id) {
        if(confirm("Are you sure you want to delete this listing?")) {
            await fetch(`http://127.0.0.1:8000/listings/${id}`, {
                method: "DELETE"
            });
            loadMyListings();
        }
    }

    function logout() {
        localStorage.clear();
        window.location = "index.html";
    }

    loadMyListings();
    initPickerMap();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farm Guru - Demand Prediction</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="dashboard-container">
    <aside class="sidebar">
        <h2>Farm Guru</h2>
        <nav id="nav-links">
            <!-- Dynamic Navigation -->
        </nav>
        <div style="margin-top: auto;">
            <button onclick="logout()" class="btn-secondary">Sign Out</button>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <div>
                <h1>AI Demand Prediction</h1>
                <p style="color: var(--text-muted);">Intelligent insights to help you plant what the market wants.</p>
            </div>
            <button onclick="predict()" style="width: auto; padding: 10px 25px;">Run Analysis</button>
        </header>

        <div class="card">
            <h3>Crop Demand Overview</h3>
            <div style="height: 300px; margin-bottom: 40px;">
                <canvas id="demandChart"></canvas>
            </div>
        </div>

        <div id="results" class="grid">
            <div class="card" style="grid-column: 1 / -1; text-align: center; padding: 60px;">
                <p style="color: var(--text-muted);">Start an analysis to see AI-driven demand trends.</p>
            </div>
        </div>
    </main>
</div>

<script>
    let demandChart;

    async function predict(){
        const results = document.getElementById("results");
        results.innerHTML = "<div class='card' style='grid-column: 1 / -1; text-align: center; padding: 60px;'><p>Analyzing market trends...</p></div>";
        
        try {
            const res = await fetch("http://127.0.0.1:8000/demand");
            const data = await res.json();

            results.innerHTML = "";

            data.forEach(item => {
                const trendUp = item.trend === "Upward";
                const trendColor = trendUp ? "#2d6a4f" : "#bc4749";
                const riskColor = item.risk === "Low" ? "#2d6a4f" : "#bc4749";

                results.innerHTML += `
                    <div class="card fade-in">
                        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 20px;">
                            <h3 style="margin: 0;">${item.crop}</h3>
                            <span class="badge" style="background: ${trendColor}15; color: ${trendColor};">
                                ${item.trend}
                            </span>
                        </div>
                        <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 12px;">Market Risk: <strong style="color: ${riskColor}">${item.risk}</strong></p>
                        <div style="background: var(--primary-soft); color: var(--primary); padding: 8px 12px; border-radius: 8px; font-size: 13px; font-weight: 600; margin-bottom: 15px;">
                            Analysis: ${item.prediction}
                        </div>
                        <button class="btn-secondary" style="font-size: 13px; padding: 10px;">Full Report</button>
                    </div>
                `;
            });

            initDemandChart(data);
        } catch (e) {
            results.innerHTML = "<div class='card' style='grid-column: 1 / -1; text-align: center; padding: 60px; color: #bc4749;'><p>Analysis failed. Please check your connection.</p></div>";
        }
    }

    function initDemandChart(data) {
        const ctx = document.getElementById('demandChart').getContext('2d');
        const labels = data.map(d => d.crop);
        const values = data.map(() => Math.floor(Math.random() * 50) + 50); // Mocked data for demo

        if (demandChart) demandChart.destroy();

        demandChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Predicted Market Demand Index',
                    data: values,
                    borderColor: '#2d6a4f',
                    backgroundColor: 'rgba(45, 106, 79, 0.1)',
                    fill: true,
                    tension: 0.4,
                    borderWidth: 3,
                    pointBackgroundColor: '#2d6a4f'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true, grid: { borderDash: [5, 5] } },
                    x: { grid: { display: false } }
                }
            }
        });
    }

    const role = localStorage.getItem("role") || "farmer";

    // Dynamic Sidebar
    const nav = document.getElementById("nav-links");
    if (role === "farmer") {
        nav.innerHTML = `
            <a href="dashboard.html">Dashboard</a>
            <a href="marketplace.html">Sell Crops</a>
            <a href="market.html">Market Prices</a>
            <a href="demand.html" class="active">Demand Prediction</a>
            <a href="consumer_marketplace.html">Buy Crops</a>
        `;
    } else {
        nav.innerHTML = `
            <a href="consumer_marketplace.html">Marketplace</a>
            <a href="consumer_map.html">Map Search</a>
            <a href="market.html">Market Prices</a>
        `;
    }

    function logout(){
        localStorage.clear();
        window.location = "index.html";
    }
</script>

</body>
</html>
